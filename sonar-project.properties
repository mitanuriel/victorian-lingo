# ── SonarCloud project identity ──────────────────────────────────────────────
# Update these two values after creating the project at sonarcloud.io:
#   https://sonarcloud.io/projects/create
sonar.projectKey=mitanuriel_victorian-lingo
sonar.organization=mitanuriel

sonar.projectName=Victorian Lingo
sonar.projectVersion=1.0

# ── Source layout ─────────────────────────────────────────────────────────────
sonar.sources=src,app
sonar.tests=src/__tests__
sonar.exclusions=src/__tests__/**,src/__mocks__/**
sonar.sourceEncoding=UTF-8

# ── TypeScript / JavaScript ───────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Exclusions ────────────────────────────────────────────────────────────────
# Don't measure coverage on test infrastructure or generated theme constants
sonar.coverage.exclusions=\
  src/__tests__/**,\
  src/__mocks__/**,\
  src/theme/**,\
  **/*.d.ts

# Don't flag duplication inside generated/constant-heavy theme files
sonar.cpd.exclusions=src/theme/**
